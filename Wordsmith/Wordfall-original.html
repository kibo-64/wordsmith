<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Wordfall</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<style>
  html, body {
    background: linear-gradient(180deg, #f5efe5 0%, #ecdfd0 100%);
    overflow: hidden;
  }
  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .device-wrap {
    transform-origin: center center;
  }
  /* iPhone bezel */
  .phone {
    width: 402px;
    height: 874px;
    border-radius: 56px;
    background: #000;
    box-shadow:
      0 0 0 2px rgba(0, 0, 0, 0.25),
      0 40px 90px rgba(80, 40, 100, 0.25),
      0 0 0 8px #1a1a1f,
      0 0 0 10px #050505;
    position: relative;
    overflow: hidden;
  }
  .phone-screen {
    position: absolute;
    inset: 0;
    border-radius: 48px;
    overflow: hidden;
    background: #0a0410;
  }
  .dynamic-island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    border-radius: 22px;
    background: #000;
    z-index: 60;
    pointer-events: none;
  }
  .home-indicator {
    position: absolute;
    bottom: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 100px;
    background: rgba(255, 255, 255, 0.7);
    z-index: 60;
    pointer-events: none;
  }
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px 0;
    z-index: 55;
    pointer-events: none;
    color: #fff;
    font-family: -apple-system, "SF Pro", system-ui;
    font-weight: 600;
    font-size: 16px;
  }
  .status-bar .icons {
    display: flex;
    gap: 6px;
    align-items: center;
    padding-right: 6px;
  }
  /* responsive scaling */
  @media (max-height: 920px) and (min-width: 500px) {
    .device-wrap { transform: scale(0.92); }
  }
  @media (max-height: 820px) and (min-width: 500px) {
    .device-wrap { transform: scale(0.82); }
  }
  @media (max-height: 740px) and (min-width: 500px) {
    .device-wrap { transform: scale(0.73); }
  }
  @media (max-height: 660px) and (min-width: 500px) {
    .device-wrap { transform: scale(0.65); }
  }

  /* On real phones — strip the iPhone bezel, scale the design to fit viewport */
  @media (max-width: 499px) {
    body, html { background: #0a0410; overflow: hidden; }
    .page-bg { display: none; }
    .stage {
      width: 100vw;
      height: 100vh;
    }
    .device-wrap {
      width: 402px;
      height: 874px;
      transform-origin: center;
      transform: scale(min(calc(100vw / 402), calc(100vh / 874)));
    }
    .phone {
      box-shadow: none;
      background: #0a0410;
    }
    .phone-screen {
      border-radius: 0;
    }
    .dynamic-island,
    .home-indicator,
    .status-bar {
      display: none;
    }
    /* status bar area no longer reserved at top - reclaim some space */
    .game-screen .hud { padding-top: 18px; }
  }
</style>
</head>
<body>
<div class="page-bg"></div>

<div class="stage">
  <div class="device-wrap">
    <div class="phone">
      <div class="phone-screen">
        <div class="status-bar">
          <span>9:41</span>
          <div class="icons">
            <svg width="18" height="11" viewBox="0 0 18 11" fill="#fff"><rect y="7" width="3" height="4" rx="0.6"/><rect x="5" y="5" width="3" height="6" rx="0.6"/><rect x="10" y="2.5" width="3" height="8.5" rx="0.6"/><rect x="15" width="3" height="11" rx="0.6"/></svg>
            <svg width="16" height="11" viewBox="0 0 16 11" fill="#fff"><path d="M8 2.5c2.1 0 4 .85 5.4 2.3l1-1.1A8 8 0 0 0 1.6 3.7l1 1.1A7.5 7.5 0 0 1 8 2.5zM8 5.7c1.3 0 2.4.5 3.3 1.4l1-1.1A6 6 0 0 0 3.7 6l1 1.1A4.6 4.6 0 0 1 8 5.7z" /><circle cx="8" cy="9.5" r="1.3"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="#fff" strokeOpacity=".35" fill="none"/><rect x="2" y="2" width="19" height="8" rx="1.5" fill="#fff"/><path d="M24 4v4c.7-.25 1.3-1 1.3-2s-.6-1.75-1.3-2z" fill="#fff" fillOpacity=".4"/></svg>
          </div>
        </div>
        <div id="root" style="position: absolute; inset: 0;"></div>
        <div class="dynamic-island"></div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<script src="words.js"></script>
<script type="text/babel" src="game-logic.jsx"></script>
<script type="text/babel" src="game.jsx"></script>

</body>
</html>
